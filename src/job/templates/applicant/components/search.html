{% load i18n %}

<div class="sticky top-20 z-40 shadow-lg rounded-box md:w-[70%] md:mx-auto mt-4">
    <form>
        <div class="join join-vertical md:join-horizontal w-full">
            <div class="w-full">
                <div class="w-full">
                    <input class="input join-item input-lg w-full" placeholder="{{filter.form.search.field.widget.attrs.placeholder }}" 
                        name="{{filter.form.search.name}}" value="{%if filter.form.search.value %}{{filter.form.search.value}}{%endif %}" 

                    />
                </div>
            </div>
            <select name="{{ filter.form.status.name }}" class="select join-item select-lg w-full md:w-auto">
                {% for value, label in filter.form.status.field.choices %}
                <option value="{{ value }}" {% if filter.form.status.value == value|stringformat:"s" %}selected{% endif %}>
                    {{ label }}
                </option>
                {% endfor %}
            </select>

            <button class="btn join-item btn-lg btn-primary">Search</button>
        </div>
    </form>
</div>
